<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier</title>
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.3.1/default/snipcart.css">
    <style>
        body { 
            margin: 0; 
            padding: 20px; 
            font-family: Arial, sans-serif;
            background: transparent;
        }
        .snipcart-add-item {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .snipcart-add-item:hover {
            background: #45a049;
        }
        .product {
            border: 1px solid #ddd;
            padding: 20px;
            border-radius: 10px;
            max-width: 300px;
            margin: 0 auto;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin: 10px 0;
        }
        .cart-link {
            display: block;
            text-align: center;
            background: #ff6b6b;
            color: white;
            padding: 10px;
            border-radius: 25px;
            text-decoration: none;
            margin-bottom: 20px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
    </style>
</head>
<body>
    <!-- Bouton panier -->
    <a href="#" class="cart-link snipcart-checkout">
        🛒 Voir le panier (<span class="snipcart-items-count">0</span>)
    </a>

    <!-- Exemple de produit -->
    <div class="product">
        <h3>Mon Produit</h3>
        <p>Description du produit</p>
        <div class="price">29,99 €</div>
        <button class="snipcart-add-item"
            data-item-id="produit-1"
            data-item-price="29.99"
            data-item-url="https://tonsite.com"
            data-item-name="Mon Produit"
            data-item-description="Description">
            Ajouter au panier
        </button>
    </div>

    <script src="https://cdn.snipcart.com/themes/v3.3.1/default/snipcart.js"></script>
    <div id="snipcart" data-api-key=YWYyODNhYTUtNTI4Mi00NzgxLWFiNWEtMTRjZWU2MWZhNGFkNjM5MTk4MTI3OTgwNDc5MTMx data-config-modal-style="side" hidden></div>
</body>
</html>
