<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Boutique</title>
  
  <!-- CSS de Snipcart -->
  <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.4.0/default/snipcart.css" />
  
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding: 40px; background-color: #f4f4f9; }
    .card { background: white; border-radius: 10px; padding: 20px; max-width: 350px; margin: 0 auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    button { background-color: #111; color: white; border: none; padding: 12px 24px; border-radius: 5px; cursor: pointer; font-size: 16px; margin-top: 15px; }
    button:hover { background-color: #333; }
  </style>
</head>
<body>

  <div class="card">
    <h2>Mon Produit</h2>
    <p>Prix : 20,00 €</p>
    
    <!-- Bouton Snipcart -->
    <button class="snipcart-add-item"
      data-item-id="produit-1"
      data-item-price="20.00"
      data-item-url=https://tendancescuisinesbriancon-png.github.io/ma-boutique/"
      data-item-name="Mon Produit">
      Ajouter au panier
    </button>
  </div>

  <!-- Script Snipcart -->
  <script async src="https://cdn.snipcart.com/themes/v3.4.0/default/snipcart.js"></script>
  <div id="snipcart" data-api-key=YWYyODNhYTUtNTI4Mi00NzgxLWFiNWEtMTRjZWU2MWZhNGFkNjM5MTk4MTI3OTgwNDc5MTMx hidden></div>

</body>
</html>
