<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier</title>
    <link rel="stylesheet" href="https://cdn.snipcart.com/themes/v3.3.1/default/snipcart.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 50px;
        }
        .cart-button {
            background: #ff6b6b;
            color: white;
            padding: 10px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-family: Arial, sans-serif;
            font-size: 16px;
            display: inline-block;
            transition: background 0.3s;
        }
        .cart-button:hover {
            background: #ff5252;
        }
        .cart-count {
            background: white;
            color: #ff6b6b;
            border-radius: 50%;
            padding: 2px 8px;
            margin-left: 8px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <a href="#" class="cart-button snipcart-checkout">
        🛒 Panier <span class="snipcart-items-count cart-count">0</span>
    </a>
    
    <script src="https://cdn.snipcart.com/themes/v3.3.1/default/snipcart.js"></script>
    <div id="snipcart" data-api-key=YWYyODNhYTUtNTI4Mi00NzgxLWFiNWEtMTRjZWU2MWZhNGFkNjM5MTk4MTI3OTgwNDc5MTMx data-config-modal-style="side" hidden></div>
</body>
</html>
