<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produit</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: transparent;
            font-family: Arial, sans-serif;
        }
        .product {
            max-width: 300px;
            margin: 0 auto;
            text-align: center;
        }
        .product img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .product h3 {
            margin: 0 0 10px 0;
            color: #333;
        }
        .product p {
            color: #666;
            margin: 0 0 15px 0;
        }
        .price {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
        }
        .add-to-cart {
            width: 100%;
            padding: 12px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }
        .add-to-cart:hover {
            background: #45a049;
        }
    </style>
</head>
<body>
    <div class="product">
        <img src="https://images.unsplash.com/photo-1542838132-92c53300491e?w=400" 
             alt="Panier Découverte"
             onerror="this.src='https://via.placeholder.com/400x200?text=Panier+Découverte'">
        <h3>Panier Découverte</h3>
        <p>Fromages, charcuterie, confitures artisanales</p>
        <div class="price">39,99 €</div>
        <button class="add-to-cart snipcart-add-item"
            data-item-id="panier-1"
            data-item-price="39.99"
            data-item-url="https://TON_USERNAME.github.io/snipcart-shop/"
            data-item-name="Panier Découverte"
            data-item-image="https://images.unsplash.com/photo-1542838132-92c53300491e?w=400"
            data-item-description="Fromages, charcuterie, confitures artisanales">
            🛒 Ajouter au panier
        </button>
    </div>
    
    <script src="https://cdn.snipcart.com/themes/v3.3.1/default/snipcart.js"></script>
    <div id="snipcart" data-api-key=YWYyODNhYTUtNTI4Mi00NzgxLWFiNWEtMTRjZWU2MWZhNGFkNjM5MTk4MTI3OTgwNDc5MTMx data-config-modal-style="side" hidden></div>
</body>
</html>
